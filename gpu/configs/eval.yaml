# Evaluate a trained S-JEPA model on the full test set (GPU).
# Start with: evalsjepa -c gpu/configs/eval.yaml
run_name: sjepa_base
runs_root: runs
device: cuda
seed: 0
init_weights: runs/sjepa_base/train/weights/best.pt

dataset:
  use_hdf5: false
  validate: true
  train_path: data/train.zip
  test_path: data/test.zip
  train_h5: data/train.h5
  test_h5: data/test.h5
  max_train_samples: null
  max_test_samples: null
  val_prob: 0.5
  sample_rate: 16000
  max_seconds: 15.0
  num_workers: 8
  augment:
    enabled: false

model:
  size: base

masking:
  mask_ratio: 0.65
  mask_length: 10

train:
  epochs: 1
  batch_size: 24
  grad_accum: 1
  phase: 1
  use_visible_loss: false

gmm:
  num_clusters: 100
  kmeans_iters: 5
  em_iters: 20
  fit_frames: 200000
  path: null

checkpoint:
  dir: null
  max_checkpoint: 5
  resume: false
  ckpt_step: 0           # in-epoch checkpoint every N processed batches (0 = off)

best:
  metric: kl
