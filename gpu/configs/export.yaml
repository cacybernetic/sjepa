# Export the trained encoder to ONNX and run standalone inference (GPU).
# Export:    exportsjepa -c gpu/configs/export.yaml
# Inference: infersjepa -c gpu/configs/export.yaml --audio path/to/clip.wav
run_name: sjepa_base
runs_root: runs
device: cuda
seed: 0
init_weights: runs/sjepa_base/train/weights/best.pt
onnx_path: runs/sjepa_base/export/encoder.onnx
audio: data/sample.wav

model:
  size: base

gmm:
  num_clusters: 100
