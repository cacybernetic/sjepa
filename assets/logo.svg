<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!--
    S-JEPA logo.
    Idea: a rounded badge holding a speech waveform. The middle frames are
    "masked" (faded, marked with a dashed box) because S-JEPA hides frames and
    predicts them. Three soft dots above stand for the soft GMM cluster
    posteriors. Colors follow the README badges (blue, orange, teal).
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b3d62"/>
      <stop offset="1" stop-color="#00557f"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#36a2e0"/>
      <stop offset="0.5" stop-color="#5ec7d8"/>
      <stop offset="1"   stop-color="#36a2e0"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Badge background -->
  <rect x="24" y="24" width="464" height="464" rx="104" ry="104" fill="url(#bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="104" ry="104"
        fill="none" stroke="#0a2f4d" stroke-width="6"/>

  <!-- Soft cluster posteriors (three blurred dots, fading right) -->
  <g filter="url(#soft)">
    <circle cx="196" cy="116" r="15" fill="#ff8c2b" opacity="0.95"/>
    <circle cx="256" cy="104" r="12" fill="#ff8c2b" opacity="0.65"/>
    <circle cx="312" cy="120" r="9"  fill="#ff8c2b" opacity="0.40"/>
  </g>

  <!-- Center line of the waveform -->
  <line x1="84" y1="300" x2="428" y2="300" stroke="#0a2f4d" stroke-width="4"
        opacity="0.5"/>

  <!-- Waveform bars. Middle group is masked (faded). -->
  <g fill="url(#wave)" stroke="none">
    <!-- visible left -->
    <rect x="92"  y="262" width="16" height="76"  rx="8"/>
    <rect x="120" y="232" width="16" height="136" rx="8"/>
    <rect x="148" y="284" width="16" height="32"  rx="8"/>
    <rect x="176" y="208" width="16" height="184" rx="8"/>
    <rect x="204" y="250" width="16" height="100" rx="8"/>
    <!-- masked middle (faded) -->
    <g opacity="0.22">
      <rect x="232" y="276" width="16" height="48"  rx="8"/>
      <rect x="260" y="244" width="16" height="112" rx="8"/>
      <rect x="288" y="268" width="16" height="64"  rx="8"/>
    </g>
    <!-- visible right -->
    <rect x="316" y="220" width="16" height="160" rx="8"/>
    <rect x="344" y="262" width="16" height="76"  rx="8"/>
    <rect x="372" y="240" width="16" height="120" rx="8"/>
    <rect x="400" y="276" width="16" height="48"  rx="8"/>
  </g>

  <!-- Dashed "mask" box around the hidden frames -->
  <rect x="222" y="196" width="92" height="208" rx="16" fill="none"
        stroke="#ff8c2b" stroke-width="5" stroke-dasharray="14 10" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="256" y="446" text-anchor="middle"
        font-family="DejaVu Sans, Arial, sans-serif" font-size="64"
        font-weight="700" letter-spacing="2" fill="#eaf6ff">S-JEPA</text>
</svg>
